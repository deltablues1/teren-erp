<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teren — {% block title %}Panel{% endblock %}</title>
  <style>
    :root { --bg:#f4f6f8; --card:#fff; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb;
            --brand:#0f766e; --brand2:#115e59; --ok:#16a34a; --warn:#d97706; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;
           background:var(--bg); color:var(--ink); }
    header { background:var(--brand); color:#fff; display:flex; align-items:center;
             gap:24px; padding:0 20px; height:56px; }
    header .brand { font-weight:700; font-size:18px; }
    header nav { display:flex; gap:16px; flex:1; }
    header nav a { color:#d1fae5; text-decoration:none; padding:6px 10px; border-radius:6px; }
    header nav a:hover { background:var(--brand2); color:#fff; }
    header nav a.active { background:var(--brand2); color:#fff; }
    header .logout { color:#d1fae5; text-decoration:none; font-size:14px; }
    main { max-width:1100px; margin:24px auto; padding:0 16px; }
    h1 { font-size:22px; margin:0 0 16px; }
    h2 { font-size:17px; margin:24px 0 10px; }
    .cards { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:22px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:10px;
            padding:16px 18px; min-width:150px; }
    .card .n { font-size:26px; font-weight:700; color:var(--brand); }
    .card .l { color:var(--muted); font-size:13px; }
    table { width:100%; border-collapse:collapse; background:var(--card);
            border:1px solid var(--line); border-radius:10px; overflow:hidden; }
    th, td { text-align:left; padding:9px 12px; border-bottom:1px solid var(--line); font-size:14px; }
    th { background:#f9fafb; color:var(--muted); font-weight:600; }
    tr:last-child td { border-bottom:none; }
    a.row { color:var(--brand); text-decoration:none; font-weight:600; }
    a.row:hover { text-decoration:underline; }
    .tag { display:inline-block; padding:2px 8px; border-radius:999px; font-size:12px; font-weight:600; }
    .tag.obr { background:#dbeafe; color:#1e40af; }
    .tag.kur { background:#dcfce7; color:#166534; }
    .ok { color:var(--ok); font-weight:600; }
    .warn { color:var(--warn); font-weight:600; }
    .muted { color:var(--muted); }
    .search { margin:6px 0 16px; }
    .search input { padding:9px 12px; border:1px solid var(--line); border-radius:8px; width:320px; font-size:14px; }
    .search button { padding:9px 16px; border:none; background:var(--brand); color:#fff;
                     border-radius:8px; font-size:14px; cursor:pointer; }
    .pill { background:#f3f4f6; border:1px solid var(--line); padding:1px 7px; border-radius:6px;
            font-family:ui-monospace,monospace; font-size:12px; }
    .empty { color:var(--muted); padding:20px; text-align:center; }
    .back { color:var(--muted); text-decoration:none; font-size:14px; }
    .banner { background:#ecfdf5; border:1px solid #a7f3d0; color:#065f46;
              padding:10px 14px; border-radius:8px; margin-bottom:14px; font-size:14px; }
    .banner.err { background:#fef2f2; border-color:#fecaca; color:#991b1b; }
    details.novi { background:var(--card); border:1px solid var(--line); border-radius:10px;
                   padding:10px 14px; margin-bottom:16px; }
    details.novi summary { cursor:pointer; font-weight:600; color:var(--brand); }
    .formgrid { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:12px; }
    .formgrid input, .formgrid select { padding:8px 10px; border:1px solid var(--line);
                   border-radius:8px; font-size:14px; }
    .formgrid input[type=text], .formgrid input:not([type]) { min-width:200px; }
    .formgrid button { padding:8px 16px; border:none; background:var(--brand); color:#fff;
                   border-radius:8px; cursor:pointer; font-size:14px; }
  </style>
</head>
<body>
  <header>
    <div class="brand">🏗️ Teren</div>
    <nav>
      <a href="/" class="{% if aktivno=='dashboard' %}active{% endif %}">Pregled</a>
      <a href="/asistent" class="{% if aktivno=='asistent' %}active{% endif %}">Asistent</a>
      <a href="/zadaci" class="{% if aktivno=='zadaci' %}active{% endif %}">Zadaci</a>
      <a href="/skladiste" class="{% if aktivno=='skladiste' %}active{% endif %}">Skladište</a>
      <a href="/ponude" class="{% if aktivno=='ponude' %}active{% endif %}">Ponude</a>
      <a href="/katalog" class="{% if aktivno=='katalog' %}active{% endif %}">Katalog</a>
      <a href="/pregled" class="{% if aktivno=='pregled' %}active{% endif %}">Za pregled</a>
      <a href="/radnici" class="{% if aktivno=='radnici' %}active{% endif %}">Radnici</a>
      <a href="/satnica" class="{% if aktivno=='satnica' %}active{% endif %}">Satnica</a>
      <a href="/vozila" class="{% if aktivno=='vozila' %}active{% endif %}">Vozila</a>
    </nav>
    <a class="logout" href="/logout">Odjava</a>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
