<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f766e">
  <title>{% block title %}Teren{% endblock %}</title>
  <style>
    :root {
      --brand: #0f766e; --brand2: #115e59; --brand3: #0d9488;
      --ok: #16a34a; --warn: #d97706; --err: #dc2626;
      --bg: #f0fdf4; --card: #fff; --ink: #1f2937; --muted: #6b7280;
      --line: #e5e7eb; --radius: 14px; --shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg); color: var(--ink);
      min-height: 100%; display: flex; flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom, 16px);
    }

    /* Gornji bar */
    .topbar {
      background: var(--brand); color: #fff;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; height: 56px;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar .brand { font-weight: 700; font-size: 17px; }
    .topbar .projekt-chip {
      font-size: 12px; background: rgba(255,255,255,.15);
      padding: 3px 10px; border-radius: 20px; max-width: 160px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .topbar .odjava { font-size: 13px; color: rgba(255,255,255,.8);
      text-decoration: none; padding: 6px 4px; }

    /* Donja navigacija */
    .bottomnav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--card); border-top: 1px solid var(--line);
      display: flex; justify-content: space-around; align-items: center;
      height: 60px; padding-bottom: env(safe-area-inset-bottom, 0);
      z-index: 100;
    }
    .bottomnav a {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-decoration: none; color: var(--muted);
      font-size: 11px; gap: 2px; padding: 6px 0;
    }
    .bottomnav a.active { color: var(--brand); }
    .bottomnav a svg { width: 22px; height: 22px; stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* Glavni sadržaj */
    main { flex: 1; padding: 16px; padding-bottom: 76px; max-width: 600px;
           width: 100%; margin: 0 auto; }

    /* Gumbi */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 20px; border: none; border-radius: var(--radius);
      font-size: 16px; font-weight: 600; cursor: pointer;
      width: 100%; text-decoration: none; text-align: center;
      transition: filter .15s; -webkit-tap-highlight-color: transparent;
    }
    .btn:active { filter: brightness(.9); }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-ok     { background: var(--ok); color: #fff; }
    .btn-warn   { background: var(--warn); color: #fff; }
    .btn-err    { background: var(--err); color: #fff; }
    .btn-ghost  { background: #f3f4f6; color: var(--ink); border: 1px solid var(--line); }
    .btn-sm { padding: 10px 14px; font-size: 14px; width: auto; }
    .btn-row { display: flex; gap: 10px; }
    .btn-row .btn { flex: 1; }

    /* Kartice */
    .card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
      box-shadow: var(--shadow);
    }
    .card-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
    .card-sub { color: var(--muted); font-size: 13px; }

    /* Forma */
    textarea, input[type=text], input[type=password], input[type=number] {
      width: 100%; border: 2px solid var(--line); border-radius: 10px;
      padding: 14px; font-size: 16px; font-family: inherit;
      background: var(--card); color: var(--ink); outline: none;
      transition: border-color .15s; -webkit-appearance: none;
    }
    textarea:focus, input:focus { border-color: var(--brand); }

    /* Baneri */
    .banner {
      border-radius: 10px; padding: 12px 14px; font-size: 14px;
      margin-bottom: 14px;
    }
    .banner-ok  { background: #dcfce7; color: #166534; border: 1px solid #a7f3d0; }
    .banner-err { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .banner-warn { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }

    /* Badge */
    .badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 20px; height: 20px; border-radius: 10px; font-size: 11px;
      font-weight: 700; padding: 0 5px;
    }
    .badge-ok   { background: #dcfce7; color: #166534; }
    .badge-warn { background: #fffbeb; color: #92400e; }
    .badge-err  { background: #fef2f2; color: #991b1b; }

    /* Razdjelnik */
    .sep { height: 1px; background: var(--line); margin: 16px 0; }

    /* Loading spinner */
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Utility */
    .muted { color: var(--muted); font-size: 13px; }
    .center { text-align: center; }
    .bold { font-weight: 700; }
    .mt8 { margin-top: 8px; }
    .mt16 { margin-top: 16px; }
    h2 { font-size: 18px; margin-bottom: 12px; }
    h3 { font-size: 15px; margin-bottom: 8px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <span class="brand">Teren</span>
    {% if projekt_naziv %}
      <span class="projekt-chip">{{ projekt_naziv }}</span>
    {% endif %}
    {% if radnik_ime %}
      <a class="odjava" href="/teren/odjava">Odjava</a>
    {% endif %}
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  {% if radnik_ime %}
  <nav class="bottomnav">
    <a href="/teren/unos" class="{% if aktivno=='unos' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5"/><path d="M17.586 3.586a2 2 0 112.828 2.828L12 15l-4 1 1-4 9.414-9.414z"/></svg>
      Unos
    </a>
    <a href="/teren/zadaci" class="{% if aktivno=='zadaci' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><path d="M9 12l2 2 4-4"/></svg>
      Zadaci
    </a>
    <a href="/teren/zaliha" class="{% if aktivno=='zaliha' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
      Zaliha
    </a>
    <a href="/teren/odabir" class="{% if aktivno=='odabir' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v2m0 16v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M2 12h2m16 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      Projekt
    </a>
  </nav>
  {% endif %}
</body>
</html>
