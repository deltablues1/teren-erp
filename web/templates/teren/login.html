{% extends "teren/base.html" %}
{% block title %}Prijava{% endblock %}

{% block content %}
<div class="center" style="padding-top: 32px;">
  <div style="font-size: 48px; margin-bottom: 8px;">🔌</div>
  <h2>Teren — prijava</h2>
  <p class="muted" style="margin-bottom: 24px;">Unesite vaš PIN</p>
</div>

{% if greska %}
<div class="banner banner-err">{{ greska }}</div>
{% endif %}

<form method="post" action="/teren/login" id="pinForm">
  <!-- Skriveno polje — punjeno JS PIN padom -->
  <input type="password" name="pin" id="pinInput" inputmode="numeric"
         pattern="[0-9]*" autocomplete="off" maxlength="6" required
         style="text-align:center; font-size:28px; letter-spacing:8px; margin-bottom:20px;"
         placeholder="••••">

  <!-- PIN pad gumbi -->
  <div id="pinPad" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:280px; margin:0 auto 20px;">
    {% for d in ['1','2','3','4','5','6','7','8','9','','0','⌫'] %}
    <button type="button"
      style="padding:18px 0; font-size:22px; font-weight:600; border:1px solid var(--line);
             border-radius:12px; background:var(--card); cursor:pointer;
             {% if d == '' %}visibility:hidden{% endif %}"
      onclick="pinClick('{{ d }}')"
    >{{ d }}</button>
    {% endfor %}
  </div>

  <button type="submit" class="btn btn-primary" id="submitBtn" style="max-width:280px;display:block;margin:0 auto;">
    Prijava
  </button>
</form>

<script>
  const inp = document.getElementById('pinInput');
  function pinClick(d) {
    if (d === '⌫') {
      inp.value = inp.value.slice(0, -1);
    } else {
      if (inp.value.length < 6) inp.value += d;
    }
  }
  // Auto-submit na 4+ znamenki (ako sve OK)
  inp.addEventListener('input', function() {
    if (this.value.length >= 4) {
      // malo pričekaj, može tipkati još
    }
  });
</script>
{% endblock %}
